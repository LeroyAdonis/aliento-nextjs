<svg width="200" height="56" viewBox="0 0 200 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="alientoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0d9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Icon: Stylized medical cross with rounded corners -->
  <rect x="4" y="8" width="40" height="40" rx="12" fill="url(#crossGrad)"/>
  <!-- Cross -->
  <rect x="18" y="14" width="12" height="28" rx="2" fill="white"/>
  <rect x="12" y="22" width="24" height="12" rx="2" fill="white"/>
  <!-- Breath/air circles (subtle) -->
  <circle cx="52" cy="20" r="3" fill="#1a73e8" opacity="0.3"/>
  <circle cx="56" cy="14" r="2" fill="#0d9488" opacity="0.2"/>
  <circle cx="58" cy="22" r="1.5" fill="#1a73e8" opacity="0.15"/>
  <!-- Wordmark -->
  <text x="68" y="36" font-family="Plus Jakarta Sans, sans-serif" font-size="28" font-weight="700" fill="#1e293b">Aliento</text>
</svg>
