<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf9f7"/>
      <stop offset="100%" style="stop-color:#f0f7ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="900" cy="200" rx="250" ry="200" fill="#dbeafe" opacity="0.4"/>
  <ellipse cx="200" cy="450" rx="200" ry="160" fill="#ccfbf1" opacity="0.3"/>
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#1a73e8" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Aliento logo mark -->
  <circle cx="100" cy="100" r="40" fill="url(#accent)" opacity="0.9"/>
  <rect x="92" y="86" width="16" height="28" rx="2" fill="white"/>
  <rect x="86" y="22" width="28" height="16" rx="2" fill="white" transform="translate(0 12)"/>
  <text x="100" y="580" font-family="sans-serif" font-size="18" fill="#1a73e8" font-weight="600" opacity="0.6">ALIENTO HEALTH</text>
  <text x="1100" y="580" font-family="sans-serif" font-size="16" fill="#78716c" text-anchor="end" opacity="0.5">aliento.clinic</text>
</svg>
