<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdfa"/>
      <stop offset="100%" style="stop-color:#f0f7ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#1a73e8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Organic blobs -->
  <ellipse cx="900" cy="200" rx="250" ry="200" fill="#ccfbf1" opacity="0.5"/>
  <ellipse cx="150" cy="500" rx="200" ry="150" fill="#dbeafe" opacity="0.4"/>
  <!-- Grid pattern -->
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#0d9488" opacity="0.1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Icon -->
  <circle cx="100" cy="100" r="40" fill="url(#accent)" opacity="0.9"/>
  <path d="M85 100 L95 100 L95 85 L105 85 L105 100 L115 100 L115 110 L105 110 L105 125 L95 125 L95 110 L85 110 Z" fill="white"/>
  <!-- Category label -->
  <text x="100" y="580" font-family="sans-serif" font-size="18" fill="#0d9488" font-weight="600" opacity="0.6">WELLNESS</text>
  <!-- Brand -->
  <text x="1100" y="580" font-family="sans-serif" font-size="16" fill="#78716c" text-anchor="end" opacity="0.5">aliento.clinic</text>
</svg>
